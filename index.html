<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4F8;--surface:#FFFFFF;--surface2:#F5F7FA;--surface3:#EDF0F4;
  --cyan:#0090B0;--text:#1A2332;--text-muted:#5A6A7E;--text-dim:#94A3B8;
  --green:#16A34A;--amber:#D97706;--red:#DC2626;--purple:#7C3AED;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--text-dim);border-radius:2px}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,100,130,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,130,.07) 1px,transparent 1px);background-size:40px 40px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.badge-nc{background:#F1F5F9;color:#64748B;border:1px solid #CBD5E1}
.badge-co{background:rgba(0,144,176,.08);color:#0070A0;border:1px solid rgba(0,144,176,.25)}
.badge-in{background:rgba(124,58,237,.08);color:#6D28D9;border:1px solid rgba(124,58,237,.25)}
.badge-re{background:rgba(220,38,38,.08);color:#B91C1C;border:1px solid rgba(220,38,38,.25)}
.badge-hi{background:rgba(22,163,74,.08);color:#15803D;border:1px solid rgba(22,163,74,.25)}
.otw-banner{background:#DCFCE7;border:1px solid #86EFAC;border-radius:5px;padding:4px 10px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#15803D;letter-spacing:.04em;text-transform:uppercase}
.otw-dot{width:7px;height:7px;border-radius:50%;background:#16A34A;flex-shrink:0;animation:pulse-g 1.8s ease-in-out infinite}
@keyframes pulse-g{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.avatar{width:42px;height:42px;border-radius:8px;background:rgba(0,144,176,.08);border:1px solid rgba(0,144,176,.2);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--cyan);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid #CBD5E1}
.btn-ghost:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.btn-cyan{background:var(--cyan);color:#fff;border:1px solid var(--cyan)}
.btn-cyan:hover:not(:disabled){background:#0070A0}
.btn-danger{background:rgba(220,38,38,.08);color:var(--red);border:1px solid rgba(220,38,38,.25)}
.btn-danger:hover:not(:disabled){background:rgba(220,38,38,.15)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-act{background:var(--surface3);color:var(--text)}
input,textarea,select{background:var(--surface);border:1px solid #CBD5E1;color:var(--text);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 11px;outline:none;width:100%;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,144,176,.1)}
textarea{resize:vertical;min-height:64px}
.modal-ov{position:fixed;inset:0;background:rgba(15,25,40,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid #CBD5E1;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hd{padding:20px 22px 16px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between}
.modal-bd{padding:20px 22px}
.modal-ft{padding:14px 22px;border-top:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center}
.stat-card{background:var(--surface);border:1px solid #E2E8F0;border-radius:10px;padding:14px 18px;flex:1;min-width:100px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:all .15s;user-select:none;position:relative;overflow:hidden}
.stat-card:hover{border-color:rgba(0,144,176,.35);box-shadow:0 3px 10px rgba(0,144,176,.08);transform:translateY(-1px)}
.stat-card.active{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,144,176,.12);transform:translateY(-1px)}
.stat-card .act-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--cyan);border-radius:0 0 10px 10px}
.cand-card{background:var(--surface);border:1px solid #E2E8F0;border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cand-card:hover{border-color:rgba(0,144,176,.4);box-shadow:0 4px 12px rgba(0,144,176,.1);transform:translateY(-1px)}
.cand-card.otw{border-left:3px solid #16A34A}
.company-box{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid #E2E8F0;border-radius:5px;padding:3px 9px;font-size:12px;font-weight:500;color:var(--text-muted)}
.kan-col{background:var(--surface2);border:1px solid #E2E8F0;border-radius:10px;padding:12px;min-width:220px;flex:1}
.nav-pill{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;background:none}
.nav-pill.active{background:rgba(0,144,176,.1);border-color:rgba(0,144,176,.3);color:var(--cyan)}
.nav-pill:not(.active){color:var(--text-muted)}
.nav-pill:not(.active):hover{color:var(--text);background:var(--surface2)}
.note-item{background:var(--surface2);border:1px solid #E2E8F0;border-radius:6px;padding:10px 12px;margin-bottom:6px}
.divider{height:1px;background:#E2E8F0;margin:14px 0}
.slabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.li-btn{display:inline-flex;align-items:center;gap:4px;background:#0A66C2;color:#fff!important;font-size:12px;font-weight:500;text-decoration:none;padding:3px 9px;border-radius:4px;transition:background .15s;font-family:'DM Sans',sans-serif}
.li-btn:hover{background:#004182}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.s-ok{background:var(--green)}.s-busy{background:var(--amber);animation:pulse 1s infinite}.s-err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spinner-d{border-color:#E2E8F0;border-top-color:var(--cyan)}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:fadeIn .2s ease;font-family:'DM Sans',sans-serif}
.t-ok{background:#15803D;color:#fff}.t-err{background:var(--red);color:#fff}
.toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle{width:38px;height:22px;border-radius:11px;background:#CBD5E1;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:#16A34A}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(16px)}
.f-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(0,144,176,.08);border:1px solid rgba(0,144,176,.25);border-radius:20px;padding:3px 10px 3px 12px;font-size:12px;color:#0070A0;font-weight:500}
.f-pill.grn{background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.25);color:#15803D}
.f-pill button{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:0;color:inherit;opacity:.7}
.f-pill button:hover{opacity:1}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-line{flex:1;height:1px}
.agency-card{background:var(--surface);border:1px solid #E2E8F0;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
</style>
</head>

function getInits(n){return n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function fmtDate(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}catch{return iso}}
function pb(v){if(typeof v==='boolean')return v;if(typeof v==='string')return v.toLowerCase()==='true';return false}
function normTC(v){if(v===true||v==='true')return'Yes';if(v===false||v==='false')return'No';if(!v||v==='')return'Unknown';return v}

async function apiGet(){const r=await fetch(`${SHEET_URL}?action=getCandidates`);return r.json()}
async function apiSave(c){const r=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'saveCandidate',candidate:c})});return r.json()}
async function apiDel(id){const r=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'deleteCandidate',id})});return r.json()}

function TCBadge({v}){
  if(v==='Yes')return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'#0090B0',border:'1px solid #0070A0',borderRadius:5,padding:'3px 10px',fontSize:11,fontWeight:700,color:'#fff',letterSpacing:'.05em',textTransform:'uppercase',boxShadow:'0 1px 3px rgba(0,144,176,.35)'}}>✓ TAQA Certified</span>;
  if(v==='No')return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.3)',borderRadius:5,padding:'3px 10px',fontSize:11,fontWeight:700,color:'#B91C1C',letterSpacing:'.05em',textTransform:'uppercase'}}>✗ Not Certified</span>;
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'#F1F5F9',border:'1px solid #CBD5E1',borderRadius:5,padding:'3px 10px',fontSize:11,fontWeight:600,color:'#64748B',letterSpacing:'.05em',textTransform:'uppercase'}}>? Cert Unknown</span>;
}

function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);
  return <div className={`toast ${type==='error'?'t-err':'t-ok'}`}>{msg}</div>;
}

function TACert({val,onChange}){
  const opts=[
    {v:'Yes',label:'✓ Yes',ac:'#0090B0',ab:'rgba(0,144,176,.06)',at:'#0070A0'},
    {v:'No',label:'✗ No',ac:'#DC2626',ab:'rgba(220,38,38,.04)',at:'#B91C1C'},
    {v:'Unknown',label:'? Unknown',ac:'#94A3B8',ab:'#F8FAFC',at:'#64748B'},
  ];
  return(
    <div style={{display:'flex',gap:8}}>
      {opts.map(o=>(
        <button key={o.v} onClick={()=>onChange(o.v)}
          style={{flex:1,padding:'10px 6px',borderRadius:6,border:`2px solid ${val===o.v?o.ac:'#E2E8F0'}`,background:val===o.v?o.ab:'var(--surface)',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:13,color:val===o.v?o.at:'var(--text-muted)',transition:'all .15s'}}>
          {o.label}
        </button>
      ))}
    </div>
  );
}

function App(){
  const [cands,setCands]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [sync,setSync]=useState('ok');
  const [toast,setToast]=useState(null);
  const [view,setView]=useState('cards');
  const [tab,setTab]=useState('candidates');
  const [search,setSearch]=useState('');
  const [fStatus,setFStatus]=useState('All');
  const [fOTW,setFOTW]=useState(false);
  const [fTAQA,setFTAQA]=useState(false);
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);

  // Prospects with localStorage persistence
  const [actionedIds,setActionedIds]=useState(()=>{
    try{const s=localStorage.getItem('taqa_actioned_prospects');return s?new Set(JSON.parse(s)):new Set();}catch{return new Set();}
  });
  const [prospects,setProspects]=useState(()=>
    SEED_PROSPECTS.filter(p=>{try{const s=localStorage.getItem('taqa_actioned_prospects');const ids=s?JSON.parse(s):[];return!ids.includes(p.id);}catch{return true;}})
  );

  function actionProspect(id){
    const next=new Set(actionedIds);next.add(id);setActionedIds(next);
    try{localStorage.setItem('taqa_actioned_prospects',JSON.stringify([...next]));}catch{}
    setProspects(prev=>prev.filter(x=>x.id!==id));
  }
  function dismissProspect(id){actionProspect(id);}
  function addProspectToCRM(p){
    actionProspect(p.id);
    handleAdd({id:Date.now(),initials:getInits(p.name),name:p.name,title:p.title,location:p.location,currentCompany:p.currentCompany||'',status:'Not Contacted',openToWork:false,taqaCertified:p.taqaCertified,email:'',phone:'',cvUrl:'',notes:[{id:Date.now(),text:p.notes,ts:new Date().toISOString()}],linkedin:p.linkedin,source:'Prospect Search',agency:'',interviewDate:''});
  }

  function clearFilters(){setFStatus('All');setFOTW(false);setFTAQA(false);setSearch('');}
  function showToast(msg,type='success'){setToast({msg,type,id:Date.now()})}

  useEffect(()=>{
    // Show seed data immediately so the UI is never blank
    setCands(SEED.map(c=>({...c,taqaCertified:normTC(c.taqaCertified),currentCompany:c.currentCompany||'',email:c.email||'',phone:c.phone||'',notes:Array.isArray(c.notes)?c.notes:[]})));
    setLoading(false);
    // Then fetch from Sheets in background — update silently if successful
    setSync('busy');
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),15000);
    fetch(`${SHEET_URL}?action=getCandidates`,{signal:controller.signal})
      .then(r=>r.json())
      .then(async res=>{
        clearTimeout(timeout);
        if(res.error)throw new Error(res.error);
        let list=res.candidates||[];
        if(list.length===0){
          // Batch seed — single POST with all candidates
          await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'seedCandidates',candidates:SEED})});
          list=SEED;
        }
        list=list.map(c=>({...c,openToWork:pb(c.openToWork),taqaCertified:normTC(c.taqaCertified),email:c.email||'',phone:c.phone||'',currentCompany:c.currentCompany||'',notes:Array.isArray(c.notes)?c.notes:[]}));
        setCands(list);
        setSync('ok');
      })
      .catch(err=>{
        clearTimeout(timeout);
        if(err.name==='AbortError'){showToast('Sheets timeout — working offline','error');}
        else{showToast('Could not reach Google Sheets — working offline','error');}
        setSync('error');
      });
    return()=>{controller.abort();clearTimeout(timeout);};
  },[]);

  async function handleUpdate(u){
    setCands(prev=>prev.map(c=>String(c.id)===String(u.id)?u:c));
    setSelected(null);setSaving(true);setSync('busy');
    try{await apiSave(u);setSync('ok');showToast('Saved ✓')}
    catch{setSync('error');showToast('Save failed','error')}
    finally{setSaving(false)}
  }

  async function handleAdd(c){
    setCands(prev=>[...prev,c]);
    setShowAdd(false);setSaving(true);setSync('busy');
    try{await apiSave(c);setSync('ok');showToast('Candidate added ✓')}
    catch{setSync('error');showToast('Save failed','error')}
    finally{setSaving(false)}
  }

  async function handleDel(id){
    if(!confirm('Delete this candidate?'))return;
    setCands(prev=>prev.filter(c=>String(c.id)!==String(id)));
    setSelected(null);setSync('busy');
    try{await apiDel(id);setSync('ok');showToast('Deleted')}
    catch{setSync('error');showToast('Delete failed on server','error')}
  }

  const stats=useMemo(()=>({
    total:cands.length,
    interviewed:cands.filter(c=>c.status==='Interview').length,
    rejected:cands.filter(c=>c.status==='Rejected').length,
    otw:cands.filter(c=>pb(c.openToWork)).length,
  }),[cands]);

  const filtered=useMemo(()=>{
    return cands.filter(c=>{
      const q=search.toLowerCase();
      const ms=!q||c.name.toLowerCase().includes(q)||c.title.toLowerCase().includes(q)||(c.currentCompany||'').toLowerCase().includes(q);
      return ms&&(fStatus==='All'||c.status===fStatus)&&(!fOTW||pb(c.openToWork))&&(!fTAQA||c.taqaCertified==='Yes');
    });
  },[cands,search,fStatus,fOTW,fTAQA]);

  const otwCands=useMemo(()=>filtered.filter(c=>pb(c.openToWork)),[filtered]);
  const restCands=useMemo(()=>filtered.filter(c=>!pb(c.openToWork)),[filtered]);
  const kanban=useMemo(()=>{const g={};STATUSES.forEach(s=>{g[s]=filtered.filter(c=>c.status===s&&!pb(c.openToWork));g[s+'_otw']=filtered.filter(c=>c.status===s&&pb(c.openToWork))});return g},[filtered]);

  const hasFilters=fStatus!=='All'||fOTW||fTAQA||!!search;

  const statCards=[
    {key:'total',label:'Active',val:stats.total,color:'var(--text)',isActive:!hasFilters,onClick:clearFilters},
    {key:'int',label:'Interviewed',val:stats.interviewed,color:'var(--purple)',isActive:fStatus==='Interview',onClick:()=>setFStatus(p=>p==='Interview'?'All':'Interview')},
    {key:'rej',label:'Rejected',val:stats.rejected,color:'var(--red)',isActive:fStatus==='Rejected',onClick:()=>setFStatus(p=>p==='Rejected'?'All':'Rejected')},
    {key:'otw',label:'Open to Work',val:stats.otw,color:'#16A34A',isActive:fOTW,onClick:()=>setFOTW(p=>!p)},
  ];

  return(
    <div style={{position:'relative',zIndex:1,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{borderBottom:'1px solid #E2E8F0',background:'rgba(255,255,255,.93)',backdropFilter:'blur(10px)',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
        <div style={{maxWidth:1400,margin:'0 auto',padding:'0 20px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:58}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:36,height:36,borderRadius:8,background:'rgba(0,144,176,.1)',border:'1px solid rgba(0,144,176,.25)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{color:'var(--cyan)',fontFamily:'JetBrains Mono',fontSize:11,fontWeight:600}}>RTU</span>
              </div>
              <div>
                <div style={{fontFamily:'DM Serif Display',fontSize:17,color:'var(--text)'}}>TAQA <span style={{color:'var(--cyan)'}}>Talent</span> CRM</div>
                <div style={{fontSize:10,color:'var(--text-dim)',letterSpacing:'.06em',textTransform:'uppercase'}}>RTU · SCADA · Substation Automation</div>
              </div>
            </div>
            <div style={{display:'flex',gap:4}}>
              {['candidates','prospects','partners'].map(t=>(
                <button key={t} className={`nav-pill ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
                  {t.charAt(0).toUpperCase()+t.slice(1)}
                  {t==='candidates'&&<span style={{marginLeft:5,background:'#F1F5F9',color:'var(--text-muted)',borderRadius:4,padding:'0 5px',fontSize:11}}>{cands.length}</span>}
                </button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{display:'flex',alignItems:'center',fontSize:12,color:'var(--text-muted)'}}>
                <span className={`sync-dot ${sync==='ok'?'s-ok':sync==='busy'?'s-busy':'s-err'}`}/>
                {sync==='ok'?'Synced':sync==='busy'?'Saving…':'Connection error'}
              </div>
              <button className="btn btn-cyan" onClick={()=>setShowAdd(true)}>+ Add Candidate</button>
            </div>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1400,margin:'0 auto',padding:'20px',width:'100%',flex:1}}>

        {loading&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 0',gap:12,color:'var(--text-muted)',fontSize:14}}><div className="spinner spinner-d"/>Loading from Google Sheets…</div>}

        {!loading&&tab==='candidates'&&(
          <div>
            {/* Stat cards */}
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
              {statCards.map(s=>(
                <div key={s.key} className={`stat-card${s.isActive?' active':''}`} onClick={s.onClick}>
                  <div style={{fontSize:11,color:'var(--text-muted)',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:5}}>{s.label}</div>
                  <div style={{fontSize:26,fontWeight:600,fontFamily:'JetBrains Mono',color:s.isActive?'var(--cyan)':s.color}}>{s.val}</div>
                  {s.isActive&&<div className="act-bar"/>}
                </div>
              ))}
            </div>

            {/* Active filter pills */}
            {hasFilters&&(
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                <span style={{fontSize:12,color:'var(--text-muted)'}}>Filtered by:</span>
                {fStatus!=='All'&&<div className="f-pill">{fStatus} <button onClick={()=>setFStatus('All')}>×</button></div>}
                {fOTW&&<div className="f-pill grn">Open to Work <button onClick={()=>setFOTW(false)}>×</button></div>}
                {fTAQA&&<div className="f-pill" style={{background:'rgba(0,144,176,.1)',borderColor:'rgba(0,144,176,.4)',color:'#0070A0'}}>✓ TAQA Certified <button onClick={()=>setFTAQA(false)}>×</button></div>}
                {search&&<div className="f-pill">"{search}" <button onClick={()=>setSearch('')}>×</button></div>}
                <button onClick={clearFilters} style={{fontSize:12,color:'var(--text-dim)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',padding:0}}>Clear all</button>
                <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:4}}>— {filtered.length} of {cands.length}</span>
              </div>
            )}

            {/* Toolbar */}
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,flexWrap:'wrap'}}>
              <input placeholder="Search name, title or company…" value={search} onChange={ev=>setSearch(ev.target.value)} style={{maxWidth:300,flex:'1 1 200px'}}/>
              <select value={fStatus} onChange={ev=>setFStatus(ev.target.value)} style={{width:'auto'}}>
                <option value="All">All Statuses</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
              <button
                onClick={()=>setFTAQA(p=>!p)}
                style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 12px',borderRadius:6,border:`2px solid ${fTAQA?'#0090B0':'#CBD5E1'}`,background:fTAQA?'#0090B0':'var(--surface)',color:fTAQA?'#fff':'var(--text-muted)',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:600,transition:'all .15s',whiteSpace:'nowrap'}}>
                ✓ TAQA Certified
              </button>
              <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
                <button className={`btn btn-ghost btn-sm ${view==='cards'?'btn-act':''}`} onClick={()=>setView('cards')}>⊞ Cards</button>
                <button className={`btn btn-ghost btn-sm ${view==='kanban'?'btn-act':''}`} onClick={()=>setView('kanban')}>⊟ Pipeline</button>
              </div>
            </div>

            {/* Cards view — OTW section first, then everyone else */}
            {view==='cards'&&(
              <div>
                {otwCands.length>0&&(
                  <div style={{marginBottom:28}}>
                    <SectionHeader label="Open to Work" count={otwCands.length} color="#16A34A" bg="rgba(22,163,74,.06)" border="rgba(22,163,74,.2)"/>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:12}}>
                      {otwCands.map(c=><CandCard key={c.id} cand={c} onClick={()=>setSelected(c)}/>)}
                    </div>
                  </div>
                )}
                {restCands.length>0&&(
                  <div style={{marginBottom:28}}>
                    <SectionHeader label="All Candidates" count={restCands.length} color="var(--text-muted)" bg="var(--surface2)" border="#E2E8F0"/>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:12}}>
                      {restCands.map(c=><CandCard key={c.id} cand={c} onClick={()=>setSelected(c)}/>)}
                    </div>
                  </div>
                )}
                {filtered.length===0&&<div style={{textAlign:'center',padding:'60px',color:'var(--text-dim)'}}>No candidates match your filters.</div>}
              </div>
            )}

            {/* Kanban view */}
            {view==='kanban'&&(
              <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:12,alignItems:'flex-start'}}>
                {STATUSES.map(s=>(
                  <div key={s} className="kan-col">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,paddingBottom:8,borderBottom:'1px solid #E2E8F0'}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <span style={{width:8,height:8,borderRadius:2,background:SDOT[s],display:'inline-block'}}/>
                        <span style={{fontSize:12,fontWeight:600,letterSpacing:'.04em',color:'var(--text-muted)'}}>{s.toUpperCase()}</span>
                      </div>
                      <span style={{fontSize:12,fontFamily:'JetBrains Mono',background:'#F1F5F9',color:'var(--text-muted)',borderRadius:4,padding:'0 6px'}}>{(kanban[s]?.length||0)+(kanban[s+'_otw']?.length||0)}</span>
                    </div>
                    {kanban[s+'_otw']?.map(c=><KanCard key={c.id} cand={c} onClick={()=>setSelected(c)}/>)}
                    {kanban[s]?.map(c=><KanCard key={c.id} cand={c} onClick={()=>setSelected(c)}/>)}
                    {(kanban[s]?.length||0)+(kanban[s+'_otw']?.length||0)===0&&<div style={{color:'var(--text-dim)',fontSize:12,textAlign:'center',padding:'16px 0'}}>Empty</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {!loading&&tab==='prospects'&&(
          <div>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
              <div>
                <div style={{fontFamily:'DM Serif Display',fontSize:20,marginBottom:4}}>Prospects</div>
                <div style={{color:'var(--text-muted)',fontSize:14}}>Engineers with TAQA/ADDC competency, GCC-based. Add to CRM or dismiss if not suitable.</div>
              </div>
              <div style={{background:'rgba(0,144,176,.06)',border:'1px solid rgba(0,144,176,.2)',borderRadius:8,padding:'10px 14px',fontSize:12,color:'var(--text-muted)',maxWidth:280}}>
                <span style={{fontWeight:600,color:'var(--cyan)'}}>↻ Want fresh results?</span><br/>
                Ask me "refresh my prospects" in this chat and I'll run new searches and send you an updated file.
                <div style={{marginTop:7,borderTop:'1px solid rgba(0,144,176,.15)',paddingTop:7}}>
                  <button onClick={()=>{try{localStorage.removeItem('taqa_actioned_prospects')}catch{} setProspects(SEED_PROSPECTS);setActionedIds(new Set());}}
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-dim)',fontSize:11,textDecoration:'underline',padding:0}}>
                    Restore dismissed prospects
                  </button>
                </div>
              </div>
            </div>
            <div style={{background:'var(--surface)',border:'1px solid #E2E8F0',borderRadius:10,padding:'14px 18px',marginBottom:24,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Run a LinkedIn search</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {LI_SEARCHES.map(s=>(
                  <a key={s.label} href={s.url} target="_blank" style={{textDecoration:'none'}}>
                    <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--surface2)',border:'1px solid #E2E8F0',borderRadius:6,padding:'6px 12px',fontSize:12,fontWeight:500,color:'var(--text)',cursor:'pointer'}}>
                      🔍 {s.label} ↗
                    </span>
                  </a>
                ))}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:12}}>
              {prospects.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}>All prospects actioned. Ask me to refresh with new searches.</div>}
              {prospects.map(p=>(
                <div key={p.id} style={{background:'var(--surface)',border:'1px solid #E2E8F0',borderRadius:10,padding:'16px',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{p.name}</div>
                      <div style={{color:'var(--text-muted)',fontSize:12,lineHeight:1.4,marginBottom:5}}>{p.title}</div>
                      <div style={{fontSize:11,color:'var(--text-dim)'}}>📍 {p.location}</div>
                    </div>
                    {p.linkedin&&<a href={p.linkedin} target="_blank" style={{textDecoration:'none',flexShrink:0}}><span className="li-btn">in LinkedIn</span></a>}
                  </div>
                  {p.currentCompany&&<div style={{marginBottom:8}}><span className="company-box">🏢 {p.currentCompany}</span></div>}
                  <div style={{background:'var(--surface2)',border:'1px solid #F1F5F9',borderRadius:6,padding:'8px 10px',fontSize:12,color:'var(--text-muted)',lineHeight:1.5,marginBottom:10}}>{p.notes}</div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                    <TCBadge v={p.taqaCertified}/>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>dismissProspect(p.id)}>✕ Dismiss</button>
                      <button className="btn btn-cyan btn-sm" onClick={()=>addProspectToCRM(p)}>+ Add to CRM</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {!loading&&tab==='partners'&&(
          <div>
            <div style={{marginBottom:18}}>
              <div style={{fontFamily:'DM Serif Display',fontSize:20,marginBottom:4}}>Sourcing Partners</div>
              <div style={{color:'var(--text-muted)',fontSize:14}}>Recruitment agencies and technical contractors relevant to this search</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:16,marginBottom:32}}>
              {PARTNERS.map(p=>(
                <div key={p.id} className="agency-card fade-in">
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12,gap:12}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{p.name}</div>
                      <span style={{display:'inline-block',background:p.tb,border:`1px solid ${p.tbd}`,color:p.tc,fontSize:11,fontWeight:600,padding:'2px 9px',borderRadius:4}}>{p.type}</span>
                    </div>
                    <a href={p.url} target="_blank" style={{textDecoration:'none',flexShrink:0}}><span className="btn btn-ghost btn-sm">↗ Visit</span></a>
                  </div>
                  <div style={{color:'var(--text-muted)',fontSize:13,lineHeight:1.6,marginBottom:12}}>{p.desc}</div>
                  <div className="divider"/>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                    <span style={{fontSize:12,color:'var(--text-dim)'}}>📍 {p.region}</span>
                    {p.contact?<a href={`mailto:${p.contact}`} style={{color:'var(--cyan)',fontSize:13,textDecoration:'none',fontWeight:500}}>{p.contact}</a>:<span style={{fontSize:12,color:'var(--text-dim)'}}>Contact via website</span>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:'DM Serif Display',fontSize:18,marginBottom:12}}>Where to Find More Engineers</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
              {[
                {src:'LinkedIn Recruiter',tip:'Search: "TAQA" AND "RTU" AND "SCADA" in UAE. Filter: "Open to Work". Keywords: ADDC competency, DMS, IEC 61968.'},
                {src:'ADIPEC Network',tip:'Annual Abu Dhabi energy exhibition. Target engineers from Autochim, Siemens Energy, Schneider booths.'},
                {src:'Autochim Systems Alumni',tip:'Former Autochim engineers frequently move into client-side roles. Search LinkedIn for "Autochim Systems" in past experience.'},
                {src:'GCC Job Boards',tip:'Bayt.com, GulfTalent, Naukrigulf — filter "SCADA Engineer Abu Dhabi", AED 15,000–25,000/month.'},
              ].map(r=>(
                <div key={r.src} style={{background:'var(--surface)',border:'1px solid #E2E8F0',borderRadius:8,padding:'14px 16px',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
                  <div style={{fontWeight:600,fontSize:13,color:'var(--cyan)',marginBottom:6}}>→ {r.src}</div>
                  <div style={{color:'var(--text-muted)',fontSize:13,lineHeight:1.5}}>{r.tip}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      <footer style={{borderTop:'1px solid #E2E8F0',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:11,color:'var(--text-dim)',background:'rgba(255,255,255,.8)'}}>
        <span>TAQA RTU TALENT CRM · ABU DHABI · {new Date().getFullYear()}</span>
        <span>{cands.length} CANDIDATES · BACKED BY GOOGLE SHEETS</span>
        <span>TENDER D-114063 · RTU/DMS INTEGRATION</span>
      </footer>

      {selected&&<CandModal cand={selected} saving={saving} onClose={()=>setSelected(null)} onUpdate={handleUpdate} onDelete={handleDel}/>}
      {showAdd&&<AddModal saving={saving} onClose={()=>setShowAdd(false)} onAdd={handleAdd}/>}
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
