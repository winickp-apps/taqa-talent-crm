<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAQA RTU Talent CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #07070C;
    --surface: #0F0F18;
    --surface2: #16161F;
    --surface3: #1D1D28;
    --border: rgba(0,180,216,0.12);
    --border-strong: rgba(0,180,216,0.25);
    --cyan: #00B4D8;
    --cyan-dim: rgba(0,180,216,0.15);
    --cyan-glow: rgba(0,180,216,0.08);
    --text: #E8E8E8;
    --text-muted: #8888A0;
    --text-dim: #4A4A62;
    --green: #22C55E;
    --amber: #F59E0B;
    --red: #EF4444;
    --purple: #A78BFA;
  }
  html, body { height: 100%; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  /* Grid bg */
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
  }

  /* Status badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .badge-not-contacted { background: rgba(74,74,98,0.3); color: var(--text-muted); border: 1px solid rgba(74,74,98,0.4); }
  .badge-contacted { background: rgba(0,180,216,0.1); color: var(--cyan); border: 1px solid rgba(0,180,216,0.25); }
  .badge-interview { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }
  .badge-shortlisted { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
  .badge-hired { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }

  .level-mid { background: rgba(0,180,216,0.08); color: var(--cyan); border: 1px solid rgba(0,180,216,0.2); font-size: 10px; padding: 1px 6px; border-radius: 3px; }
  .level-senior { background: rgba(245,158,11,0.08); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); font-size: 10px; padding: 1px 6px; border-radius: 3px; }

  /* Tag */
  .tag {
    display: inline-block; padding: 2px 7px; border-radius: 3px;
    font-size: 10px; font-weight: 500;
    background: var(--surface3); color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* Avatar */
  .avatar {
    width: 38px; height: 38px; border-radius: 6px;
    background: var(--surface3);
    border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500; color: var(--cyan);
    flex-shrink: 0;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }

  .btn-cyan {
    background: rgba(0,180,216,0.15); color: var(--cyan);
    border: 1px solid rgba(0,180,216,0.35);
  }
  .btn-cyan:hover { background: rgba(0,180,216,0.25); }

  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .btn-active { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }

  /* Input */
  input, textarea, select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 5px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 6px 10px; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--cyan); }
  textarea { resize: vertical; min-height: 60px; }
  select option { background: var(--surface2); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(7,7,12,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 10px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* Card */
  .candidate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    cursor: pointer; transition: all 0.15s;
    position: relative;
  }
  .candidate-card:hover {
    border-color: var(--border-strong);
    background: var(--surface2);
    transform: translateY(-1px);
  }
  .candidate-card.selected {
    border-color: var(--cyan);
    background: var(--surface2);
  }

  /* Kanban column */
  .kanban-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    min-width: 220px; flex: 1;
  }
  .kanban-col-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Stats */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
    flex: 1;
  }

  /* Nav pill */
  .nav-pill {
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    font-size: 12px; font-weight: 500; transition: all 0.15s;
    border: 1px solid transparent;
  }
  .nav-pill.active {
    background: rgba(0,180,216,0.12);
    border-color: rgba(0,180,216,0.3);
    color: var(--cyan);
  }
  .nav-pill:not(.active) { color: var(--text-muted); }
  .nav-pill:not(.active):hover { color: var(--text); }

  /* Agency card */
  .agency-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }

  /* Tooltip note */
  .note-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
  }

  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  .taqa-check {
    display: inline-flex; align-items: center; gap: 3px;
    color: var(--cyan); font-size: 10px; font-weight: 600;
    background: rgba(0,180,216,0.08); border: 1px solid rgba(0,180,216,0.2);
    padding: 1px 6px; border-radius: 3px;
  }

  .linkedin-link {
    color: #0A66C2; font-size: 11px; text-decoration: none;
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(10,102,194,0.08); border: 1px solid rgba(10,102,194,0.2);
    padding: 2px 6px; border-radius: 3px;
    transition: background 0.15s;
  }
  .linkedin-link:hover { background: rgba(10,102,194,0.15); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease; }

  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 6px;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

function getInitials(name) {
  return name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

// Modal for candidate detail / edit
function CandidateModal({ candidate, onClose, onUpdate }) {
  const [edit, setEdit] = useState({...candidate});
  const [noteText, setNoteText] = useState('');
  const [tab, setTab] = useState('details');

  function addNote() {
    if (!noteText.trim()) return;
    const note = { id: Date.now(), text: noteText.trim(), ts: new Date().toISOString() };
    const updated = {...edit, notes: [note, ...edit.notes]};
    setEdit(updated);
    setNoteText('');
  }

  function deleteNote(id) {
    setEdit(prev => ({...prev, notes: prev.notes.filter(n=>n.id!==id)}));
  }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal fade-in">
        <div className="modal-header">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="avatar" style={{width:42,height:42,fontSize:13}}>{edit.initials||getInitials(edit.name)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:15}}>{edit.name}</div>
              <div style={{color:'var(--text-muted)',fontSize:12}}>{edit.title}</div>
            </div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:4,padding:'10px 20px 0',borderBottom:'1px solid var(--border)'}}>
          {['details','activity','cv'].map(t=>(
            <button key={t} className={`nav-pill ${tab===t?'active':''}`} onClick={()=>setTab(t)}
              style={{borderRadius:6,padding:'4px 12px'}}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>

        <div className="modal-body">
          {tab==='details' && (
            <div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                <div>
                  <div className="section-label">Status</div>
                  <select value={edit.status} onChange={e=>setEdit(p=>({...p,status:e.target.value}))}>
                    {STATUSES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <div className="section-label">Level</div>
                  <select value={edit.level} onChange={e=>setEdit(p=>({...p,level:e.target.value}))}>
                    <option>Mid-Senior</option><option>Senior</option><option>Junior</option><option>Lead</option>
                  </select>
                </div>
                <div>
                  <div className="section-label">Location</div>
                  <input value={edit.location} onChange={e=>setEdit(p=>({...p,location:e.target.value}))}/>
                </div>
                <div>
                  <div className="section-label">Source</div>
                  <input value={edit.source} onChange={e=>setEdit(p=>({...p,source:e.target.value}))}/>
                </div>
              </div>

              <div style={{marginBottom:14}}>
                <div className="section-label">LinkedIn URL</div>
                <input placeholder="https://linkedin.com/in/..." value={edit.linkedin}
                  onChange={e=>setEdit(p=>({...p,linkedin:e.target.value}))}/>
              </div>

              <div style={{marginBottom:14}}>
                <div className="section-label">Certifications / Competencies</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {edit.certs.map((c,i)=>(
                    <span key={i} className="tag" style={{cursor:'pointer'}}
                      onClick={()=>setEdit(p=>({...p,certs:p.certs.filter((_,j)=>j!==i)}))}
                      title="Click to remove">
                      {c} <span style={{color:'var(--text-dim)',marginLeft:2}}>×</span>
                    </span>
                  ))}
                </div>
              </div>

              {edit.interviewDate && (
                <div style={{background:'rgba(167,139,250,0.08)',border:'1px solid rgba(167,139,250,0.2)',borderRadius:6,padding:'8px 12px',marginBottom:14}}>
                  <span style={{color:'#A78BFA',fontSize:12}}>◆ Interview scheduled: {formatDate(edit.interviewDate)}</span>
                </div>
              )}
              <div style={{marginBottom:14}}>
                <div className="section-label">Interview Date</div>
                <input type="date" value={edit.interviewDate||''} onChange={e=>setEdit(p=>({...p,interviewDate:e.target.value}))}/>
              </div>
            </div>
          )}

          {tab==='activity' && (
            <div>
              <div style={{marginBottom:12}}>
                <div className="section-label">Add note</div>
                <textarea placeholder="Log a call, email, or update..." value={noteText}
                  onChange={e=>setNoteText(e.target.value)} style={{marginBottom:6}}/>
                <button className="btn btn-cyan btn-sm" onClick={addNote}>+ Add note</button>
              </div>
              <div className="divider"/>
              {edit.notes.length===0 && <div style={{color:'var(--text-dim)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No activity yet.</div>}
              {edit.notes.map(n=>(
                <div key={n.id} className="note-item">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div style={{fontSize:13}}>{n.text}</div>
                    <button onClick={()=>deleteNote(n.id)} style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:11,marginLeft:8}}>✕</button>
                  </div>
                  <div style={{color:'var(--text-dim)',fontSize:11,marginTop:4}}>{formatDate(n.ts)}</div>
                </div>
              ))}
            </div>
          )}

          {tab==='cv' && (
            <div>
              <div className="section-label">CV / Portfolio Link</div>
              <input placeholder="https://..." value={edit.cvUrl||''}
                onChange={e=>setEdit(p=>({...p,cvUrl:e.target.value}))} style={{marginBottom:12}}/>
              {edit.cvUrl && (
                <a href={edit.cvUrl} target="_blank" className="btn btn-cyan" style={{textDecoration:'none',display:'inline-flex'}}>
                  ↗ Open CV
                </a>
              )}
              <div className="divider"/>
              <div className="section-label">LinkedIn Profile</div>
              {edit.linkedin ? (
                <a href={edit.linkedin} target="_blank" className="linkedin-link" style={{fontSize:12}}>
                  in Open LinkedIn Profile ↗
                </a>
              ) : (
                <div style={{color:'var(--text-dim)',fontSize:12}}>No LinkedIn URL added — set it in Details tab.</div>
              )}
            </div>
          )}
        </div>

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-cyan" onClick={()=>{onUpdate(edit);onClose();}}>Save changes</button>
        </div>
      </div>
    </div>
  );
}

// Add candidate modal
function AddCandidateModal({ onClose, onAdd }) {
  const [form, setForm] = useState({
    name:'', title:'', location:'Abu Dhabi, UAE', level:'Mid-Senior',
    status:'Not Contacted', cvUrl:'', notes:[], certs:[], linkedin:'', source:'Manual Add', agency:''
  });
  const [certInput, setCertInput] = useState('');

  function addCert() {
    if (!certInput.trim()) return;
    setForm(p=>({...p,certs:[...p.certs,certInput.trim()]}));
    setCertInput('');
  }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal fade-in">
        <div className="modal-header">
          <span style={{fontWeight:600}}>Add New Candidate</span>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body" style={{display:'grid',gap:10}}>
          <div><div className="section-label">Full Name *</div><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Ahmed Al-Mansoori"/></div>
          <div><div className="section-label">Role / Title *</div><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. SCADA Engineer — RTU Automation"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><div className="section-label">Location</div><input value={form.location} onChange={e=>setForm(p=>({...p,location:e.target.value}))}/></div>
            <div><div className="section-label">Level</div>
              <select value={form.level} onChange={e=>setForm(p=>({...p,level:e.target.value}))}>
                <option>Junior</option><option>Mid-Senior</option><option>Senior</option><option>Lead</option>
              </select>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><div className="section-label">LinkedIn</div><input value={form.linkedin} onChange={e=>setForm(p=>({...p,linkedin:e.target.value}))} placeholder="linkedin.com/in/..."/></div>
            <div><div className="section-label">CV URL</div><input value={form.cvUrl} onChange={e=>setForm(p=>({...p,cvUrl:e.target.value}))} placeholder="https://..."/></div>
          </div>
          <div>
            <div className="section-label">Certifications / Competencies</div>
            <div style={{display:'flex',gap:6,marginBottom:6}}>
              <input value={certInput} onChange={e=>setCertInput(e.target.value)} placeholder="e.g. TAQA Distribution Competency" onKeyDown={e=>{if(e.key==='Enter')addCert()}}/>
              <button className="btn btn-ghost btn-sm" onClick={addCert} style={{whiteSpace:'nowrap'}}>+ Add</button>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {form.certs.map((c,i)=><span key={i} className="tag">{c}</span>)}
            </div>
          </div>
          <div><div className="section-label">Source</div>
            <select value={form.source} onChange={e=>setForm(p=>({...p,source:e.target.value}))}>
              <option>Manual Add</option><option>LinkedIn Search</option><option>Agency</option><option>Database</option><option>Referral</option>
            </select>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-cyan" onClick={()=>{
            if(!form.name.trim()||!form.title.trim()) return;
            onAdd({...form, id:Date.now(), initials:getInitials(form.name)});
            onClose();
          }}>Add Candidate</button>
        </div>
      </div>
    </div>
  );
}

// Candidate card component
function CandidateCard({ candidate, onClick }) {
  return (
    <div className="candidate-card" onClick={onClick}>
      <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:8}}>
        <div className="avatar">{candidate.initials||getInitials(candidate.name)}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{candidate.name}</div>
          <div style={{color:'var(--text-muted)',fontSize:11,lineHeight:1.4}}>{candidate.title}</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:8}}>
        <span className={`badge ${STATUS_CLASS[candidate.status]}`}>{candidate.status}</span>
        <span className={candidate.level==='Senior'?'level-senior':'level-mid'}>{candidate.level}</span>
        {candidate.linkedin && <span style={{width:6,height:6,borderRadius:2,background:'#0A66C2',display:'inline-block'}} title="Has LinkedIn"/>}
        {candidate.cvUrl && <span style={{width:6,height:6,borderRadius:2,background:'#22C55E',display:'inline-block'}} title="Has CV"/>}
        {candidate.notes.length>0 && <span style={{color:'var(--text-dim)',fontSize:10}}>{candidate.notes.length} note{candidate.notes.length>1?'s':''}</span>}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
        {candidate.certs.slice(0,2).map((c,i)=><span key={i} className="tag">{c}</span>)}
        {candidate.certs.length>2 && <span className="tag" style={{color:'var(--text-dim)'}}>+{candidate.certs.length-2}</span>}
      </div>
      <div style={{marginTop:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{color:'var(--text-dim)',fontSize:11}}>📍 {candidate.location}</span>
        {candidate.interviewDate && <span style={{color:'#A78BFA',fontSize:10}}>◆ {formatDate(candidate.interviewDate)}</span>}
      </div>
    </div>
  );
}

// Kanban mini card
function KanbanCard({ candidate, onClick }) {
  return (
    <div onClick={onClick} style={{
      background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6,
      padding:'8px 10px', marginBottom:6, cursor:'pointer', transition:'border-color 0.15s'
    }}
    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-strong)'}
    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
    >
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <div style={{width:24,height:24,borderRadius:4,background:'var(--surface3)',border:'1px solid var(--border-strong)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:600,color:'var(--cyan)',flexShrink:0}}>{candidate.initials||getInitials(candidate.name)}</div>
        <div style={{fontWeight:500,fontSize:12,lineHeight:1.3}}>{candidate.name}</div>
      </div>
      <div style={{color:'var(--text-muted)',fontSize:10,marginBottom:4,paddingLeft:32,lineHeight:1.4}}>{candidate.title.split('—')[0].trim()}</div>
      {candidate.interviewDate && <div style={{color:'#A78BFA',fontSize:10,paddingLeft:32}}>◆ {formatDate(candidate.interviewDate)}</div>}
    </div>
  );
}

// Main App
function App() {
  const [candidates, setCandidates] = useState(INITIAL_CANDIDATES);
  const [view, setView] = useState('cards');
  const [activeTab, setActiveTab] = useState('candidates');
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('All');
  const [filterLevel, setFilterLevel] = useState('All');
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const stats = useMemo(()=>({
    total: candidates.length,
    contacted: candidates.filter(c=>c.status!=='Not Contacted').length,
    interviews: candidates.filter(c=>c.status==='Interview').length,
    shortlisted: candidates.filter(c=>c.status==='Shortlisted').length,
    hired: candidates.filter(c=>c.status==='Hired').length,
    withCV: candidates.filter(c=>c.cvUrl).length,
  }), [candidates]);

  const filtered = useMemo(()=>candidates.filter(c=>{
    const q = search.toLowerCase();
    const matchSearch = !q || c.name.toLowerCase().includes(q) || c.title.toLowerCase().includes(q)
      || c.certs.some(cert=>cert.toLowerCase().includes(q));
    const matchStatus = filterStatus==='All' || c.status===filterStatus;
    const matchLevel = filterLevel==='All' || c.level===filterLevel;
    return matchSearch && matchStatus && matchLevel;
  }), [candidates, search, filterStatus, filterLevel]);

  function updateCandidate(updated) {
    setCandidates(prev=>prev.map(c=>c.id===updated.id?updated:c));
  }

  function addCandidate(candidate) {
    setCandidates(prev=>[...prev, candidate]);
  }

  const kanbanGroups = useMemo(()=>{
    const groups = {};
    STATUSES.forEach(s=>{ groups[s]=filtered.filter(c=>c.status===s); });
    return groups;
  }, [filtered]);

  return (
    <div style={{position:'relative',zIndex:1,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <header style={{
        borderBottom:'1px solid var(--border)',
        background:'rgba(7,7,12,0.9)',
        backdropFilter:'blur(10px)',
        position:'sticky',top:0,zIndex:100,
      }}>
        <div style={{maxWidth:1400,margin:'0 auto',padding:'0 20px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{
                width:32,height:32,borderRadius:6,
                background:'rgba(0,180,216,0.12)',border:'1px solid rgba(0,180,216,0.3)',
                display:'flex',alignItems:'center',justifyContent:'center',
              }}>
                <span style={{color:'var(--cyan)',fontFamily:'JetBrains Mono',fontSize:11,fontWeight:500}}>RTU</span>
              </div>
              <div>
                <div style={{fontFamily:'DM Serif Display',fontSize:15,letterSpacing:'-0.01em'}}>
                  TAQA <span style={{color:'var(--cyan)'}}>Talent</span> CRM
                </div>
                <div style={{fontSize:10,color:'var(--text-dim)',letterSpacing:'0.06em',textTransform:'uppercase'}}>RTU · SCADA · Substation Automation</div>
              </div>
            </div>

            <div style={{display:'flex',gap:4}}>
              {['candidates','agencies'].map(t=>(
                <button key={t} className={`nav-pill ${activeTab===t?'active':''}`} onClick={()=>setActiveTab(t)}>
                  {t.charAt(0).toUpperCase()+t.slice(1)}
                  {t==='candidates' && <span style={{marginLeft:4,background:'var(--surface3)',color:'var(--text-muted)',borderRadius:3,padding:'0 4px',fontSize:10}}>{candidates.length}</span>}
                </button>
              ))}
            </div>

            <button className="btn btn-cyan" style={{fontSize:12}} onClick={()=>setShowAdd(true)}>
              + Add Candidate
            </button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1400,margin:'0 auto',padding:'20px',width:'100%',flex:1}}>

        {activeTab==='candidates' && (<>
          {/* Stats bar */}
          <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
            {[
              {label:'Total',val:stats.total,color:'var(--text)'},
              {label:'In Pipeline',val:stats.contacted,color:'var(--cyan)'},
              {label:'Interviews',val:stats.interviews,color:'#A78BFA'},
              {label:'Shortlisted',val:stats.shortlisted,color:'var(--amber)'},
              {label:'Hired',val:stats.hired,color:'var(--green)'},
              {label:'CV on File',val:stats.withCV,color:'var(--text-muted)'},
            ].map(s=>(
              <div key={s.label} className="stat-card" style={{minWidth:100}}>
                <div style={{fontSize:10,color:'var(--text-dim)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}}>{s.label}</div>
                <div style={{fontSize:24,fontWeight:600,fontFamily:'JetBrains Mono',color:s.color}}>{s.val}</div>
              </div>
            ))}
          </div>

          {/* Toolbar */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            <input placeholder="Search name, title, certifications..."
              value={search} onChange={e=>setSearch(e.target.value)}
              style={{maxWidth:300,flex:'1 1 200px'}}/>

            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{width:'auto',flex:'0 0 auto'}}>
              <option value="All">All Statuses</option>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>

            <select value={filterLevel} onChange={e=>setFilterLevel(e.target.value)} style={{width:'auto',flex:'0 0 auto'}}>
              <option value="All">All Levels</option>
              <option>Junior</option><option>Mid-Senior</option><option>Senior</option><option>Lead</option>
            </select>

            <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
              <button className={`btn btn-ghost btn-sm ${view==='cards'?'btn-active':''}`}
                onClick={()=>setView('cards')} title="Card view">⊞ Cards</button>
              <button className={`btn btn-ghost btn-sm ${view==='kanban'?'btn-active':''}`}
                onClick={()=>setView('kanban')} title="Kanban view">⊟ Pipeline</button>
            </div>

            {(search||filterStatus!=='All'||filterLevel!=='All') && (
              <div style={{fontSize:12,color:'var(--text-muted)'}}>
                Showing {filtered.length} of {candidates.length}
              </div>
            )}
          </div>

          {/* Cards view */}
          {view==='cards' && (
            <div style={{
              display:'grid',
              gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',
              gap:12,
            }}>
              {filtered.map(c=>(
                <CandidateCard key={c.id} candidate={c} onClick={()=>setSelected(c)}/>
              ))}
              {filtered.length===0 && (
                <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px 20px',color:'var(--text-dim)'}}>
                  No candidates match your filters.
                </div>
              )}
            </div>
          )}

          {/* Kanban view */}
          {view==='kanban' && (
            <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:12,alignItems:'flex-start'}}>
              {STATUSES.map(status=>(
                <div key={status} className="kanban-col">
                  <div className="kanban-col-header">
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{width:8,height:8,borderRadius:2,background:STATUS_DOT[status],display:'inline-block'}}/>
                      <span style={{fontSize:11,fontWeight:600,letterSpacing:'0.04em'}}>{status.toUpperCase()}</span>
                    </div>
                    <span style={{
                      fontSize:11, fontFamily:'JetBrains Mono',
                      background:'var(--surface3)',color:'var(--text-muted)',
                      borderRadius:3,padding:'0 5px'
                    }}>{kanbanGroups[status]?.length||0}</span>
                  </div>
                  {kanbanGroups[status]?.length===0 && (
                    <div style={{color:'var(--text-dim)',fontSize:11,textAlign:'center',padding:'16px 0'}}>Empty</div>
                  )}
                  {kanbanGroups[status]?.map(c=>(
                    <KanbanCard key={c.id} candidate={c} onClick={()=>setSelected(c)}/>
                  ))}
                </div>
              ))}
            </div>
          )}
        </>)}

        {activeTab==='agencies' && (
          <div>
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:'DM Serif Display',fontSize:18,marginBottom:4}}>Recruitment Agencies</div>
              <div style={{color:'var(--text-muted)',fontSize:13}}>Specialist firms with TAQA-approved engineering rosters in the GCC</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:12}}>
              {AGENCIES.map(a=>(
                <div key={a.id} className="agency-card fade-in">
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <div style={{fontWeight:600,fontSize:14}}>{a.name}</div>
                    <a href={a.url} target="_blank" style={{textDecoration:'none'}}>
                      <span className="btn btn-ghost btn-sm">↗ Site</span>
                    </a>
                  </div>
                  <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                    <span className="tag">{a.speciality}</span>
                    <span className="tag">📍 {a.region}</span>
                  </div>
                  <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:8}}>{a.notes}</div>
                  <div className="divider"/>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{color:'var(--text-dim)',fontSize:11}}>Contact:</span>
                    <a href={`mailto:${a.contact}`} style={{color:'var(--cyan)',fontSize:12,textDecoration:'none'}}>{a.contact}</a>
                  </div>
                </div>
              ))}
            </div>

            <div style={{marginTop:24,marginBottom:12}}>
              <div style={{fontFamily:'DM Serif Display',fontSize:16,marginBottom:4}}>Where to Find More Engineers</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
              {[
                {src:'LinkedIn Recruiter',tip:'Search: "TAQA" AND "RTU" AND "SCADA" in UAE. Filter: "Open to Work" or "Open to Opportunities". Keywords: ADDC competency, AADC, DMS, IEC 61968.'},
                {src:'ADIPEC Network',tip:'Annual Abu Dhabi energy exhibition. TAQA, ADNOC, EtihadWE all present. Target engineers from Autochim, Milele, Siemens Energy, Schneider booths.'},
                {src:'Autochim Systems',tip:'Primary subcontractor for TAQA RTU/DMS projects. Engineers leaving Autochim often carry TAQA competency — track their alumni on LinkedIn.'},
                {src:'GCC Job Boards',tip:'Bayt.com, GulfTalent, Naukrigulf — filter for "SCADA Engineer Abu Dhabi" with salary range AED 15,000–25,000/month to find active candidates.'},
              ].map(r=>(
                <div key={r.src} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontWeight:600,fontSize:12,color:'var(--cyan)',marginBottom:6}}>→ {r.src}</div>
                  <div style={{color:'var(--text-muted)',fontSize:12,lineHeight:1.5}}>{r.tip}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer style={{
        borderTop:'1px solid var(--border)',
        padding:'10px 20px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        fontSize:10,color:'var(--text-dim)',letterSpacing:'0.04em',
        background:'rgba(7,7,12,0.8)',
      }}>
        <span>TAQA RTU TALENT CRM · ABU DHABI · {new Date().getFullYear()}</span>
        <span>{candidates.length} VERIFIED CANDIDATES · ALL VERIFIED AS NOT CURRENTLY EMPLOYED BY TAQA</span>
        <span>TENDER D-114063 · RTU/DMS INTEGRATION</span>
      </footer>

      {/* Modals */}
      {selected && (
        <CandidateModal
          candidate={selected}
          onClose={()=>setSelected(null)}
          onUpdate={(updated)=>{updateCandidate(updated);setSelected(null);}}
        />
      )}
      {showAdd && (
        <AddCandidateModal
          onClose={()=>setShowAdd(false)}
          onAdd={(c)=>{addCandidate(c);setShowAdd(false);}}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
